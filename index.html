<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十一的Claude成长节点记录</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particles"></canvas>

<header class="hero">
  <div class="hero-glow"></div>
  <div class="hero-content">
    <div class="logo-mark">
      <svg viewBox="0 0 120 120"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><circle cx="60" cy="60" r="52" fill="none" stroke="url(#lg)" stroke-width="2" opacity="0.5"/><circle cx="60" cy="60" r="38" fill="none" stroke="url(#lg)" stroke-width="1.5" opacity="0.35"/><circle cx="60" cy="60" r="24" fill="none" stroke="url(#lg)" stroke-width="1" opacity="0.2"/><circle cx="60" cy="44" r="4" fill="#6366f1"/><circle cx="48" cy="68" r="3" fill="#06b6d4"/><circle cx="72" cy="68" r="3" fill="#06b6d4"/><line x1="60" y1="44" x2="48" y2="68" stroke="url(#lg)" stroke-width="1" opacity="0.6"/><line x1="60" y1="44" x2="72" y2="68" stroke="url(#lg)" stroke-width="1" opacity="0.6"/><line x1="48" y1="68" x2="72" y2="68" stroke="url(#lg)" stroke-width="1" opacity="0.3"/></svg>
    </div>
    <h1>十一的<span class="gradient-text">Claude</span>成长节点记录</h1>
    <p class="hero-sub">每一次认知跃迁，都是一个节点 · AI 辅助开发的进化图谱</p>
    <div class="hero-scroll" id="scrollHint">
      <span>探索成长历程</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
    </div>
  </div>
</header>

<main>
  <section id="dashboard" class="dashboard">
    <div class="dash-card glass" data-3d>
      <div class="dash-icon">📅</div>
      <div class="dash-num" id="stat-sessions">—</div>
      <div class="dash-label">认知节点</div>
      <div class="dash-glow"></div>
    </div>
    <div class="dash-card glass" data-3d>
      <div class="dash-icon">🔄</div>
      <div class="dash-num" id="stat-skills">—</div>
      <div class="dash-label">技能变迁</div>
      <div class="dash-glow"></div>
    </div>
    <div class="dash-card glass" data-3d>
      <div class="dash-icon">📦</div>
      <div class="dash-num" id="stat-repos">—</div>
      <div class="dash-label">关联仓库</div>
      <div class="dash-glow"></div>
    </div>
    <div class="dash-card glass" data-3d>
      <div class="dash-icon">⚓</div>
      <div class="dash-num" id="stat-anchors">—</div>
      <div class="dash-label">行为锚点</div>
      <div class="dash-glow"></div>
    </div>
  </section>

  <section id="nodes" class="nodes-section">
    <h2 class="section-title">
      <span class="title-line"></span>
      <span>成长节点</span>
      <span class="title-line"></span>
    </h2>
    <div class="node-timeline" id="nodeTimeline"></div>
  </section>

  <section id="constellation" class="constellation-section">
    <h2 class="section-title">
      <span class="title-line"></span>
      <span>行为星座图</span>
      <span class="title-line"></span>
    </h2>
    <div class="constellation" id="tagConstellation"></div>
  </section>

  <section id="archives" class="archives-section">
    <h2 class="section-title">
      <span class="title-line"></span>
      <span>时间档案</span>
      <span class="title-line"></span>
    </h2>
    <div class="archive-grid" id="archiveGrid"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-glow"></div>
  <p>由 Claude Code 自动构建 · <a href="https://github.com/81823650800wzy-sketch/claude-learning-log">GitHub</a></p>
  <p class="footer-sub">每个节点都是一次真实的认知跃迁</p>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
