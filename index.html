<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 学习日志</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <h1>🧠 Claude 学习日志</h1>
  <p class="subtitle">AI 辅助开发的认知进化记录</p>
</header>

<main>
  <section id="stats" class="stats-grid" aria-label="成长概览">
    <div class="stat-card skeleton">📅 <span class="stat-value">—</span><span class="stat-label">次会话记录</span></div>
    <div class="stat-card skeleton">🔧 <span class="stat-value">—</span><span class="stat-label">次技能变更</span></div>
    <div class="stat-card skeleton">📦 <span class="stat-value">—</span><span class="stat-label">个关联仓库</span></div>
    <div class="stat-card skeleton">⚓ <span class="stat-value">—</span><span class="stat-label">个行为锚点</span></div>
  </section>

  <section id="timeline" aria-label="学习时间线">
    <h2>🕐 学习时间线</h2>
    <div class="timeline skeleton">加载中…</div>
  </section>

  <section id="tags" aria-label="行为锚点">
    <h2>🔗 行为锚点图</h2>
    <div class="tag-cloud skeleton">加载中…</div>
  </section>

  <section id="archive" aria-label="按月归档">
    <h2>📂 按月归档</h2>
    <div class="archive-tree skeleton">加载中…</div>
  </section>
</main>

<footer>
  <p>由 Claude Code 自动维护 · <a href="https://github.com/81823650800wzy-sketch/claude-learning-log">GitHub</a></p>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
